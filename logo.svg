<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- erases the network where the comet trails sweep through -->
    <mask id="cut">
      <rect width="512" height="512" fill="white"/>
      <g stroke="black" stroke-width="26" fill="none" stroke-linecap="round">
        <path d="M300,238 Q360,198 420,152"/>
        <path d="M292,264 Q364,236 434,188"/>
        <path d="M296,290 Q368,272 440,228"/>
      </g>
    </mask>
  </defs>

  <!-- chat bubble ring + tail -->
  <circle cx="256" cy="256" r="212" fill="none" stroke="black" stroke-width="34"/>
  <path d="M352,430 Q424,474 474,484 Q452,432 428,352 Q400,404 352,430 Z" fill="black"/>

  <!-- network sphere -->
  <g mask="url(#cut)">
    <g stroke="black" stroke-width="7">
      <!-- outer ring edges -->
      <line x1="256" y1="110" x2="345" y2="140"/>
      <line x1="345" y1="140" x2="398" y2="215"/>
      <line x1="398" y1="215" x2="398" y2="300"/>
      <line x1="398" y1="300" x2="345" y2="368"/>
      <line x1="345" y1="368" x2="258" y2="398"/>
      <line x1="258" y1="398" x2="172" y2="370"/>
      <line x1="172" y1="370" x2="122" y2="300"/>
      <line x1="122" y1="300" x2="118" y2="212"/>
      <line x1="118" y1="212" x2="168" y2="142"/>
      <line x1="168" y1="142" x2="256" y2="110"/>
      <!-- spokes to center -->
      <line x1="262" y1="262" x2="256" y2="110"/>
      <line x1="262" y1="262" x2="398" y2="215"/>
      <line x1="262" y1="262" x2="345" y2="368"/>
      <line x1="262" y1="262" x2="172" y2="370"/>
      <line x1="262" y1="262" x2="118" y2="212"/>
      <!-- inner web -->
      <line x1="210" y1="205" x2="256" y2="110"/>
      <line x1="210" y1="205" x2="168" y2="142"/>
      <line x1="210" y1="205" x2="118" y2="212"/>
      <line x1="210" y1="205" x2="262" y2="262"/>
      <line x1="315" y1="215" x2="345" y2="140"/>
      <line x1="315" y1="215" x2="398" y2="215"/>
      <line x1="315" y1="215" x2="262" y2="262"/>
      <line x1="200" y1="315" x2="122" y2="300"/>
      <line x1="200" y1="315" x2="172" y2="370"/>
      <line x1="200" y1="315" x2="262" y2="262"/>
      <line x1="312" y1="320" x2="398" y2="300"/>
      <line x1="312" y1="320" x2="345" y2="368"/>
      <line x1="312" y1="320" x2="258" y2="398"/>
      <line x1="312" y1="320" x2="262" y2="262"/>
      <line x1="210" y1="205" x2="315" y2="215"/>
      <line x1="200" y1="315" x2="312" y2="320"/>
    </g>
    <g fill="black">
      <circle cx="262" cy="262" r="15"/>
      <circle cx="256" cy="110" r="11"/>
      <circle cx="345" cy="140" r="11"/>
      <circle cx="398" cy="215" r="11"/>
      <circle cx="398" cy="300" r="11"/>
      <circle cx="345" cy="368" r="11"/>
      <circle cx="258" cy="398" r="11"/>
      <circle cx="172" cy="370" r="11"/>
      <circle cx="122" cy="300" r="11"/>
      <circle cx="118" cy="212" r="11"/>
      <circle cx="168" cy="142" r="11"/>
      <circle cx="210" cy="205" r="9"/>
      <circle cx="315" cy="215" r="9"/>
      <circle cx="200" cy="315" r="9"/>
      <circle cx="312" cy="320" r="9"/>
    </g>
  </g>

  <!-- comet trails -->
  <g stroke="black" stroke-width="9" fill="none" stroke-linecap="round">
    <path d="M300,238 Q360,198 414,158"/>
    <path d="M292,264 Q364,236 428,192"/>
    <path d="M296,290 Q368,272 434,232"/>
  </g>

  <!-- sparkles -->
  <path d="M440,72 Q449,109 486,118 Q449,127 440,164 Q431,127 394,118 Q431,109 440,72 Z" fill="black"/>
  <path d="M400,168 Q404,184 420,188 Q404,192 400,208 Q396,192 380,188 Q396,184 400,168 Z" fill="black"/>
</svg>
